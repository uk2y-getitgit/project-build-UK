<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>표지 및 목차 작성 | Safety-Direct</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --navy: #1A2E44; --navy-dark: #0D1B2A; --orange: #E8500A;
  --bg: #CDD3DA; --white: #fff;
  --sec1: #1A3A5C; --sec2: #276749; --sec3: #7B4F12; --sec4: #4A1D96;
  --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Noto Sans KR", sans-serif; background: var(--bg); min-height: 100vh; color: var(--navy); }
.sd-nav { background: var(--navy-dark); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 3px 12px rgba(0,0,0,0.4); }
.sd-nav-logo { color: #fff; font-size: 15px; font-weight: 800; text-decoration: none; letter-spacing: 1px; }
.sd-nav-logo span { color: var(--orange); }
.sd-nav-center { color: #8899AA; font-size: 12px; font-weight: 500; }
.sd-nav-back { color: #8899AA; font-size: 12px; text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; border: 1px solid #2a3f52; transition: all 0.15s; }
.sd-nav-back:hover { color: #fff; border-color: #5a7a99; background: #1a2e44; }
.page-wrap { padding: 32px 20px 80px; max-width: 880px; margin: 0 auto; }
.page-header { background: linear-gradient(135deg, #1A3A5C 0%, #2D5A8E 100%); border-radius: var(--radius); padding: 24px 32px 20px; margin-bottom: 24px; display: flex; align-items: flex-start; justify-content: space-between; box-shadow: var(--shadow); }
.page-header-left { display: flex; flex-direction: column; gap: 4px; }
.page-badge { display: inline-block; background: rgba(200,168,75,0.25); color: #C8A84B; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 12px; border: 1px solid rgba(200,168,75,0.4); letter-spacing: 0.5px; width: fit-content; }
.page-title { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 8px; margin-top: 6px; }
.page-subtitle { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 4px; }
.page-header-right { text-align: right; color: rgba(255,255,255,0.35); font-size: 10px; }
.section-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
.section-header { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #fff; font-size: 13px; font-weight: 700; }
.section-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
.section-body { padding: 20px; }
.form-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
.form-row:last-child { margin-bottom: 0; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.form-group.w-full { flex: 1 1 100%; }
.form-group.w-half { flex: 0 0 calc(50% - 6px); }
.form-group.w-third { flex: 0 0 calc(33.33% - 8px); }
.form-group label { font-size: 11px; font-weight: 600; color: #5a7a99; letter-spacing: 0.3px; }
.inp { width: 100%; padding: 8px 12px; border: 1.5px solid #dce3ea; border-radius: 7px; font-family: "Noto Sans KR", sans-serif; font-size: 13px; color: var(--navy); background: #f8fafc; transition: border-color 0.15s, box-shadow 0.15s, background 0.15s; outline: none; }
.inp:focus { border-color: #1A3A5C; background: #fff; box-shadow: 0 0 0 3px rgba(26,58,92,0.10); }
.inp::placeholder { color: #b0bac6; font-size: 12px; }
textarea.inp { resize: vertical; min-height: 80px; line-height: 1.6; }
input[type=date].inp, input[type=month].inp { cursor: pointer; font-size: 13px; }
.date-range { display: flex; align-items: center; gap: 8px; }
.date-range .sep { font-size: 14px; color: #8899aa; font-weight: 600; flex-shrink: 0; align-self: center; }
.vat-toggle { display: inline-flex; gap: 4px; margin-left: 8px; vertical-align: middle; }
.vat-btn { font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid #ccc; background: #f5f5f5; color: #888; cursor: pointer; font-family: inherit; transition: all 0.15s; line-height: 1.6; }
.vat-btn.active { background: #1A2E44; color: #fff; border-color: #1A2E44; font-weight: 600; }
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-label { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px 5px 8px; border: 1.5px solid #dce3ea; border-radius: 20px; font-size: 12px; color: #4a5568; cursor: pointer; transition: all 0.15s; user-select: none; background: #f8fafc; }
.chip-label:hover { border-color: var(--sec4); color: var(--sec4); background: #f3eeff; }
.chip-label input[type=checkbox] { display: none; }
.chip-check { width: 16px; height: 16px; border: 2px solid #c0cdd8; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.revision-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
.revision-table th { background: #1A2E44; color: #fff; padding: 6px 8px; text-align: center; }
.revision-table td { border: 1px solid #dce3ea; padding: 4px; }
.revision-table td input { width: 100%; border: none; background: transparent; font-size: 11px; font-family: inherit; text-align: center; outline: none; padding: 2px; }
.btn-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 20px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; text-decoration: none; }
.btn-save { background: var(--sec2); color: #fff; }
.btn-save:hover { background: #1e5437; }
.btn-download { background: var(--orange); color: #fff; box-shadow: 0 3px 10px rgba(232,80,10,0.3); }
.btn-download:hover { background: #c44008; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.status-msg { font-size: 12px; min-height: 20px; text-align: right; margin-top: 8px; }
.status-msg.loading { color: #5a7a99; }
.status-msg.ok { color: #276749; }
.status-msg.err { color: #7F1D1D; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(26,58,92,0.3); border-top-color: #1A3A5C; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 4px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 640px) { .form-row { flex-wrap: wrap; } .form-group.w-half, .form-group.w-third { flex: 1 1 100%; } }
</style>
</head>
<body>

<nav class="sd-nav">
  <a href="/" class="sd-nav-logo">SAFETY<span>-DIRECT</span></a>
  <span class="sd-nav-center">표지 및 목차 작성</span>
  <a href="/forms.html" class="sd-nav-back">← 양식 목록</a>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <div class="page-header-left">
      <span class="page-badge">별지 제1호 서식</span>
      <div class="page-title">표지 및 목차</div>
      <div class="page-subtitle">건설공사 안전관리계획서 표지 · 심사 신청서 · 개정 이력</div>
    </div>
    <div class="page-header-right">양식 A-1-2</div>
  </div>

  <!-- 섹션1: 표지 정보 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--sec1)">
      <span class="section-num">1</span>
      표지 정보
    </div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group w-full">
          <label for="공사명">현장명 (공사명)</label>
          <input type="text" id="공사명" class="inp" placeholder="공사명을 입력하세요" oninput="syncProjectName()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group w-half">
          <label>작성 연월</label>
          <div style="display:flex; gap:6px;">
            <select id="작성연월_년" class="inp" style="flex:1;" onchange="syncYearMonth()">
              <option value="">연도</option>
            </select>
            <select id="작성연월_월" class="inp" style="flex:1;" onchange="syncYearMonth()">
              <option value="">월</option>
              <option value="01">1월</option><option value="02">2월</option>
              <option value="03">3월</option><option value="04">4월</option>
              <option value="05">5월</option><option value="06">6월</option>
              <option value="07">7월</option><option value="08">8월</option>
              <option value="09">9월</option><option value="10">10월</option>
              <option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>
          <input type="hidden" id="작성연월">
        </div>
        <div class="form-group w-half">
          <label for="시공사명">시공사명</label>
          <input type="text" id="시공사명" class="inp" placeholder="시공사명" oninput="syncCompanyName('시공사명')">
        </div>
      </div>
    </div>
  </div>

  <!-- 섹션2: 신청인 정보 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--sec2)">
      <span class="section-num">2</span>
      신청인 정보
    </div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group w-half">
          <label for="건설사명">건설사 명</label>
          <input type="text" id="건설사명" class="inp" placeholder="건설사명" oninput="syncCompanyName('건설사명')">
        </div>
        <div class="form-group w-half">
          <label for="안전총괄책임자">대표자</label>
          <input type="text" id="안전총괄책임자" class="inp" placeholder="대표자 성명" oninput="syncRepresentative()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group w-half">
          <label for="현장대리인_성명">성명 (현장대리인)</label>
          <input type="text" id="현장대리인_성명" class="inp" placeholder="현장대리인 성명">
        </div>
        <div class="form-group w-half">
          <label for="연락처">연락처</label>
          <input type="tel" id="연락처" class="inp" placeholder="010-0000-0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group w-full">
          <label for="사무소소재지">사무소 소재지</label>
          <input type="text" id="사무소소재지" class="inp" placeholder="사무소 주소">
        </div>
      </div>
    </div>
  </div>

  <!-- 섹션3: 공사 정보 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--sec3)">
      <span class="section-num">3</span>
      공사 정보
    </div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group w-full">
          <label for="신청서_공사명">공사명</label>
          <input type="text" id="신청서_공사명" class="inp" placeholder="공사명 (표지와 자동 연동)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group w-full">
          <label for="현장소재지">현장 소재지</label>
          <input type="text" id="현장소재지" class="inp" placeholder="현장 주소">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group w-half">
          <label>공사기간</label>
          <div class="date-range">
            <input type="date" id="착공예정일" class="inp">
            <span class="sep">~</span>
            <input type="date" id="준공예정일" class="inp">
          </div>
        </div>
        <div class="form-group w-half">
          <label for="공사금액">공사금액
            <span class="vat-toggle">
              <button type="button" class="vat-btn active" id="vatIncBtn" onclick="setVat('포함')">VAT 포함</button>
              <button type="button" class="vat-btn" id="vatExcBtn" onclick="setVat('별도')">VAT 별도</button>
            </span>
          </label>
          <input type="text" id="공사금액" class="inp" placeholder="예) 1,500,000,000" oninput="formatAmount(this)">
        </div>
      </div>
    </div>
  </div>

  <!-- 섹션4: 확인 신청 내용 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--sec4)">
      <span class="section-num">4</span>
      확인 신청 내용
    </div>
    <div class="section-body">
      <div class="chip-grid">
        <label class="chip-label" onclick="toggleChip(this)">
          <input type="checkbox" name="신청내용" value="총괄안전관리계획">
          <span class="chip-check"></span>
          총괄안전관리계획
        </label>
        <label class="chip-label" onclick="toggleChip(this)">
          <input type="checkbox" name="신청내용" value="공종별 세부안전관리계획">
          <span class="chip-check"></span>
          공종별 세부안전관리계획
        </label>
      </div>
    </div>
  </div>

  <!-- 섹션5: 서명 정보 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--navy)">
      <span class="section-num">5</span>
      서명 정보
    </div>
    <div class="section-body">
      <div class="form-row">
        <div class="form-group w-half">
          <label for="신청날짜">신청 날짜 <span style="font-size:10px;color:#8899aa;font-weight:400;">(작성연월 자동 연동)</span></label>
          <input type="date" id="신청날짜" class="inp">
        </div>
        <div class="form-group w-half">
          <label for="대표자성명">성명 (대표자) <span style="font-size:10px;color:#8899aa;font-weight:400;">(신청인 대표자 연동)</span></label>
          <input type="text" id="대표자성명" class="inp" placeholder="대표자 성명" readonly style="background:#f0f4f8;cursor:not-allowed;">
        </div>
      </div>
    </div>
  </div>

  <!-- 섹션6: 개정 이력 -->
  <div class="section-card">
    <div class="section-header" style="background:var(--sec1); cursor:pointer; user-select:none;" onclick="toggleRevision()">
      <span class="section-num">6</span>
      개정 이력 (0~7차)
      <span id="revisionToggleIcon" style="margin-left:auto; font-size:12px; opacity:0.7;">▶ 펼치기</span>
    </div>
    <div class="section-body" id="revisionBody_wrap" style="display:none;">
      <p style="font-size:11px; color:#6b7a8d; margin-bottom:12px;">각 개정 차수의 날짜를 입력하세요. 비어있는 항목은 HWPX에 반영되지 않습니다.</p>
      <div style="overflow-x:auto;">
        <table class="revision-table">
          <thead>
            <tr>
              <th style="min-width:160px;">항목</th>
              <th>0차</th><th>1차</th><th>2차</th><th>3차</th>
              <th>4차</th><th>5차</th><th>6차</th><th>7차</th>
            </tr>
          </thead>
          <tbody id="revisionBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 버튼 영역 -->
  <div class="btn-row">
    <button class="btn btn-save" onclick="saveForm()">💾 임시 저장</button>
    <button class="btn btn-download" id="downloadBtn" onclick="generateHwpx()">&#8595; hwpx 다운로드</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>

</div>

/* 날짜 포맷 */
function formatDate(dateStr) {
  if (!dateStr) return '';
  const p = dateStr.split('-');
  return p[0] + '.' + p[1] + '.' + p[2];
}

/* XML 이스케이프 */
function escXml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* 셀 주소 기반 삽입 */
function injectByCellAddr(xmlStr, tblIdx, colAddr, rowAddr, value) {
  if (!value) return xmlStr;
  const escaped = escXml(value);
  let cnt = 0, tblStart = -1, s = 0;
  while (true) {
    const f = xmlStr.indexOf('<hp:tbl ', s);
    if (f === -1) return xmlStr;
    if (cnt === tblIdx) { tblStart = f; break; }
    cnt++; s = f + 1;
  }
  const tblEnd = xmlStr.indexOf('</hp:tbl>', tblStart) + 9;
  const tbl    = xmlStr.slice(tblStart, tblEnd);
  const addrPat = 'colAddr="' + colAddr + '" rowAddr="' + rowAddr + '"';
  const ai = tbl.indexOf(addrPat);
  if (ai === -1) return xmlStr;
  const ts = tbl.lastIndexOf('<hp:tc', ai);
  const te = tbl.indexOf('</hp:tc>', ai) + 8;
  let tc   = tbl.slice(ts, te);
  const htO = tc.indexOf('<hp:t>');
  const htC = tc.indexOf('</hp:t>');
  if (htO !== -1 && htC !== -1) {
    tc = tc.slice(0, htO + 6) + escaped + tc.slice(htC);
  } else {
    const ri = tc.indexOf('<hp:run ');
    if (ri === -1) return xmlStr;
    const selfClose = tc.indexOf('/>', ri);
    const runClose  = tc.indexOf('</hp:run>', ri);
    if (selfClose !== -1 && (runClose === -1 || selfClose < runClose)) {
      tc = tc.slice(0, selfClose) + '><hp:t>' + escaped + '</hp:t></hp:run>' + tc.slice(selfClose + 2);
    } else if (runClose !== -1) {
      tc = tc.slice(0, runClose) + '<hp:t>' + escaped + '</hp:t>' + tc.slice(runClose);
    } else { return xmlStr; }
  }
  return xmlStr.slice(0, tblStart) + tbl.slice(0, ts) + tc + tbl.slice(te) + xmlStr.slice(tblEnd);
}

/* VAT 모드 */
let vatMode = '포함';
function setVat(mode) {
  vatMode = mode;
  document.getElementById('vatIncBtn').classList.toggle('active', mode === '포함');
  document.getElementById('vatExcBtn').classList.toggle('active', mode === '별도');
}

/* 금액 천단위 포맷 */
function formatAmount(el) {
  let v = el.value.replace(/[^0-9]/g, '');
  if (v) el.value = parseInt(v).toLocaleString('ko-KR');
}

/* 표지 현장명 동기화 (공사명 → 신청서_공사명) */
function syncProjectName() {
  const name = document.getElementById('공사명').value;
  document.getElementById('신청서_공사명').value = name;
}

/* 시공사명 ↔ 건설사명 동기화 */
function syncCompanyName(srcId) {
  const val = document.getElementById(srcId).value;
  const otherId = srcId === '시공사명' ? '건설사명' : '시공사명';
  document.getElementById(otherId).value = val;
}

/* 대표자 → 대표자성명 동기화 */
function syncRepresentative() {
  const val = document.getElementById('안전총괄책임자').value;
  document.getElementById('대표자성명').value = val;
}

/* 연/월 선택기 → hidden input + 신청날짜 동기화 */
function syncYearMonth() {
  const y = document.getElementById('작성연월_년').value;
  const m = document.getElementById('작성연월_월').value;
  if (y && m) {
    document.getElementById('작성연월').value = y + '-' + m;
    // 신청날짜: 해당 월 1일로 설정
    document.getElementById('신청날짜').value = y + '-' + m + '-01';
  } else {
    document.getElementById('작성연월').value = '';
  }
}

/* 개정이력 펼치기/접기 */
function toggleRevision() {
  const wrap = document.getElementById('revisionBody_wrap');
  const icon = document.getElementById('revisionToggleIcon');
  const isHidden = wrap.style.display === 'none';
  wrap.style.display = isHidden ? 'block' : 'none';
  icon.textContent = isHidden ? '▼ 접기' : '▶ 펼치기';
}

/* chip 토글 */
function toggleChip(label) {
  setTimeout(function() {
    const cb = label.querySelector('input[type=checkbox]');
    const chk = label.querySelector('.chip-check');
    if (cb && cb.checked) {
      label.style.borderColor = '#4A1D96';
      label.style.background = '#ede9ff';
      label.style.color = '#4A1D96';
      label.style.fontWeight = '600';
      if (chk) { chk.style.background = '#4A1D96'; chk.style.borderColor = '#4A1D96'; chk.textContent = '\u2713'; chk.style.color = '#fff'; chk.style.fontSize = '10px'; chk.style.fontWeight = '700'; }
    } else {
      label.style.borderColor = '';
      label.style.background = '';
      label.style.color = '';
      label.style.fontWeight = '';
      if (chk) { chk.style.background = ''; chk.style.borderColor = ''; chk.textContent = ''; }
    }
  }, 0);
}

/* 개정 이력 테이블 렌더링 */
function renderRevisionTable() {
  const tbody = document.getElementById('revisionBody');
  if (!tbody) return;
  tbody.innerHTML = REVISION_ROWS.map(function(r, ri) {
    return '<tr><td style="text-align:left; padding:4px 8px; font-size:11px;">' + r.label + '</td>' +
      [0,1,2,3,4,5,6,7].map(function(ci) {
        return '<td><input type="text" id="rev_' + ri + '_' + ci + '" placeholder="날짜" maxlength="12"></td>';
      }).join('') + '</tr>';
  }).join('');
}

/* 데이터 수집 */
function collectData() {
  const data = {};
  const projectName = document.getElementById('공사명').value.trim();
  const siteAddr    = document.getElementById('현장소재지').value.trim();
  const startDate   = document.getElementById('착공예정일').value;
  const endDate     = document.getElementById('준공예정일').value;
  const amount      = document.getElementById('공사금액').value.trim();

  data['gen_공사명']     = projectName;
  data['gen_현장소재지'] = siteAddr;
  data['gen_착공예정일'] = formatDate(startDate);
  data['gen_준공예정일'] = formatDate(endDate);
  data['gen_공사금액']   = amount ? amount + ' (부가세 ' + vatMode + ')' : '';
  data['gen_대표자']     = document.getElementById('대표자성명').value.trim();

  FIELD_MAP.forEach(function(entry) {
    const id = entry[3];
    if (id.startsWith('gen_')) return;
    const el = document.getElementById(id);
    if (el) data[id] = el.value.trim();
  });

  return data;
}

/* HWPX 생성 */
async function generateHwpx() {
  const btn    = document.getElementById('downloadBtn');
  const status = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 생성 중...';
  status.className = 'status-msg loading';
  status.innerHTML = '<span class="spinner"></span> hwpx 파일을 생성하고 있습니다...';
  try {
    const raw   = atob(HWPX_B64);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const zip = await JSZip.loadAsync(bytes);
    let xmlStr = await zip.file('Contents/section0.xml').async('string');
    const data = collectData();

    /* 표지 {{현장명}} 치환 */
    xmlStr = xmlStr.split('{{현장명}}').join(escXml(data['gen_공사명'] || ''));

    /* FIELD_MAP 처리 */
    for (const [tbl, col, row, id] of FIELD_MAP) {
      const val = data[id];
      if (!val) continue;
      xmlStr = injectByCellAddr(xmlStr, tbl, col, row, val);
    }

    /* 개정 이력 주입 */
    const colAddrs = [1,2,3,4,5,6,7,8];
    REVISION_ROWS.forEach(function(r, ri) {
      colAddrs.forEach(function(c, ci) {
        const el = document.getElementById('rev_' + ri + '_' + ci);
        if (el && el.value.trim()) {
          xmlStr = injectByCellAddr(xmlStr, r.tbl, c, r.row, el.value.trim());
        }
      });
    });

    zip.file('Contents/section0.xml', xmlStr);
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/hwp+zip', compression: 'DEFLATE' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const name = data['gen_공사명'] || '표지목차';
    a.href = url; a.download = '안전관리계획서_표지목차_' + name + '.hwpx'; a.click();
    URL.revokeObjectURL(url);
    status.className  = 'status-msg ok';
    status.textContent = '\u2705 hwpx 파일이 생성되었습니다. 다운로드를 확인해주세요.';
  } catch (e) {
    console.error(e);
    status.className  = 'status-msg err';
    status.textContent = '\u274c 오류: ' + e.message;
  }
  btn.disabled = false;
  btn.innerHTML = '&#8595; hwpx 다운로드';
}

/* 임시 저장 */
async function saveForm() {
  const data = collectData();
  const name = data['gen_공사명'] || '표지및목차';
  try {
    const res = await fetch('/api/forms/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ formType: '표지및목차', title: name, data })
    });
    const json = await res.json();
    const status = document.getElementById('statusMsg');
    if (json.ok) {
      status.className  = 'status-msg ok';
      status.textContent = '\u2705 저장되었습니다.';
    }
  } catch(e) {
    const status = document.getElementById('statusMsg');
    status.className  = 'status-msg err';
    status.textContent = '\u274c 저장 실패: ' + e.message;
  }
}

/* 초기화 */
renderRevisionTable();

/* 연도 선택기 옵션 생성 (현재 연도 기준 ±5년) */
(function() {
  const sel = document.getElementById('작성연월_년');
  const curY = new Date().getFullYear();
  for (let y = curY - 2; y <= curY + 5; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '년';
    if (y === curY) opt.selected = true;
    sel.appendChild(opt);
  }
  // 현재 월도 기본 선택
  const m = String(new Date().getMonth() + 1).padStart(2, '0');
  document.getElementById('작성연월_월').value = m;
  syncYearMonth();
})();

/* 저장본 불러오기 */
(async function() {
  const params = new URLSearchParams(location.search);
  const loadId = params.get('load');
  if (!loadId) return;
  try {
    const res = await fetch('/api/forms/' + loadId);
    if (!res.ok) return;
    const rec = await res.json();
    const d = rec.data || {};
    ['공사명','시공사명','건설사명','안전총괄책임자','현장대리인_성명','연락처','사무소소재지','신청서_공사명','현장소재지','착공예정일','준공예정일','공사금액','신청날짜','대표자성명'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el && d[id]) el.value = d[id];
    });
    // 작성연월 복원 (YYYY-MM 형식)
    if (d['작성연월'] && d['작성연월'].includes('-')) {
      const parts = d['작성연월'].split('-');
      document.getElementById('작성연월_년').value = parts[0];
      document.getElementById('작성연월_월').value = parts[1];
      syncYearMonth();
    }
    if (d['gen_공사명']) {
      document.getElementById('공사명').value = d['gen_공사명'];
      document.getElementById('신청서_공사명').value = d['gen_공사명'];
    }
  } catch(e) {}
})();
</script>

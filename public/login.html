<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 | Safety-Direct</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #CDD3DA; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

.login-card {
  width: 100%; max-width: 420px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15), 0 16px 40px rgba(0,0,0,0.1);
  overflow: hidden;
}

.card-header {
  background: linear-gradient(135deg, #1A3A5C, #2D5A8E);
  padding: 32px 36px 28px;
  text-align: center;
}
.logo { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 1px; }
.logo span { color: #E8500A; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 6px; }

.card-body { padding: 32px 36px; }

.field { margin-bottom: 18px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: #1A3A5C; margin-bottom: 6px; letter-spacing: 0.3px; }
.field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #C8D6E8; border-radius: 8px;
  font-size: 14px; font-family: inherit; color: #1A2E44;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus { border-color: #2D5A8E; box-shadow: 0 0 0 3px rgba(45,90,142,0.12); }
.field input.error { border-color: #E53E3E; box-shadow: 0 0 0 3px rgba(229,62,62,0.1); }

.btn-login {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #1A3A5C, #2D5A8E);
  color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.18s;
  box-shadow: 0 4px 14px rgba(26,58,92,0.3);
  margin-top: 8px;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,58,92,0.35); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.error-msg {
  font-size: 12px; color: #E53E3E; font-weight: 600;
  text-align: center; margin-top: 14px; min-height: 18px;
}

.test-accounts {
  margin-top: 24px; padding-top: 20px;
  border-top: 1px solid #E5EBF3;
}
.test-accounts-title { font-size: 11px; font-weight: 700; color: #8899AA; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; text-align: center; }
.account-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: 7px; cursor: pointer;
  border: 1px solid #E5EBF3; margin-bottom: 6px;
  transition: all 0.12s;
}
.account-item:hover { background: #EEF3FA; border-color: #B8C8DC; }
.account-info { display: flex; flex-direction: column; gap: 2px; }
.account-name { font-size: 12px; font-weight: 700; color: #1A3A5C; }
.account-id { font-size: 11px; color: #8899AA; font-family: 'Courier New', monospace; }
.account-btn { font-size: 11px; color: #2D5A8E; font-weight: 600; background: #EEF3FA; padding: 3px 10px; border-radius: 5px; }

.back-link { margin-top: 18px; text-align: center; font-size: 12px; color: #8899AA; }
.back-link a { color: #2D5A8E; font-weight: 600; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="login-card">
  <div class="card-header">
    <div class="logo">SAFETY<span>-DIRECT</span></div>
    <div class="header-sub">건설 안전관리계획서 작성 시스템</div>
  </div>
  <div class="card-body">
    <div class="field">
      <label>아이디</label>
      <input type="text" id="userId" placeholder="아이디를 입력하세요" autocomplete="username">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="userPw" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">로그인</button>
    <div class="error-msg" id="errMsg"></div>

    <div class="test-accounts">
      <div class="test-accounts-title">테스트 계정</div>
      <div class="account-item" onclick="fillAccount('admin','admin1234')">
        <div class="account-info">
          <span class="account-name">관리자 · 안티그래피 주식회사</span>
          <span class="account-id">ID: admin / PW: admin1234</span>
        </div>
        <span class="account-btn">선택</span>
      </div>
      <div class="account-item" onclick="fillAccount('test01','test1234')">
        <div class="account-info">
          <span class="account-name">홍길동 소장 · 한국건설(주)</span>
          <span class="account-id">ID: test01 / PW: test1234</span>
        </div>
        <span class="account-btn">선택</span>
      </div>
      <div class="account-item" onclick="fillAccount('test02','safe1234')">
        <div class="account-info">
          <span class="account-name">이현장 대리 · 대한안전관리(주)</span>
          <span class="account-id">ID: test02 / PW: safe1234</span>
        </div>
        <span class="account-btn">선택</span>
      </div>
    </div>
  </div>
</div>

<div class="back-link"><a href="/">← 메인으로 돌아가기</a></div>

<script>
// 이전 페이지에서 로그인 후 돌아갈 URL
const redirectTo = new URLSearchParams(location.search).get('redirect') || '/';

function fillAccount(id, pw) {
  document.getElementById('userId').value = id;
  document.getElementById('userPw').value = pw;
  document.getElementById('userId').focus();
}

async function doLogin() {
  const id  = document.getElementById('userId').value.trim();
  const pw  = document.getElementById('userPw').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('loginBtn');

  if (!id || !pw) { err.textContent = '아이디와 비밀번호를 모두 입력해주세요.'; return; }

  btn.disabled = true; btn.textContent = '로그인 중...';
  err.textContent = '';

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, pw }),
    });
    const data = await res.json();
    if (res.ok) {
      location.href = redirectTo;
    } else {
      err.textContent = data.error || '로그인에 실패했습니다.';
      document.getElementById('userPw').classList.add('error');
    }
  } catch(e) {
    err.textContent = '서버에 연결할 수 없습니다.';
  }
  btn.disabled = false; btn.textContent = '로그인';
}

// Enter 키
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// 이미 로그인된 경우 리다이렉트
fetch('/api/me').then(r => r.json()).then(d => {
  if (d.loggedIn) location.href = redirectTo;
});
</script>
</body>
</html>
